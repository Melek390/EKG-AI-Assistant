/* Main header background */
.header,
.header-wrapper,
.navbar-area {
  background: linear-gradient(
    135deg,
    #020617 0%,
    #020617 35%,
    #020617 65%,
    #020617 100%
  );
}
/* Make header compact */
.header {
  padding: 0;
}

/* Reduce navbar vertical padding */
.navbar {
  padding: 10px 0;
  min-height: unset;
}

/* Logo size control */
.navbar-brand img {
  height: 38px;   /* adjust if needed (32–42px sweet spot) */
  width: auto;
}

/* Align items vertically */
.navbar-expand-lg .navbar-nav {
  align-items: center;
}

/* Reduce nav link padding */
.navbar-nav .nav-link,
.navbar-nav .page-scroll {
  padding: 6px 12px;
  font-size: 15px;
}

/* Remove extra spacing from container */
.navbar-area .container {
  padding-top: 0;
  padding-bottom: 0;
}
/* Top bar */
.header-top {
  background: transparent;
  border-bottom: 1px solid rgba(255, 255, 255, 0.08);
}

/* Navbar links */
.navbar-nav .nav-item a {
  color: #e5e7eb;
  font-weight: 500;
}

.navbar-nav .nav-item a:hover {
  color: #38bdf8; /* subtle accent */
}

/* Brand logo fix (if SVG is dark) */
.navbar-brand img {
  filter: invert(1);
}

/* Social icons */
.header-top a,
.header-top i {
  color: #cbd5f5;
}

.header-top a:hover,
.header-top i:hover {
  color: #38bdf8;
}

/* Mobile toggler */
.navbar-toggler .toggler-icon {
  background-color: #e5e7eb;
}
	/* About image container */
	.about-img {
		width: 100%;
		margin-top: 40px;
	}

	/* Responsive about image */
	.about-img img {
		width: 100%;
		max-width: 1100px;   /* adjust width if needed */
		height: auto;
		display: block;
		margin: 0 auto;
		object-fit: cover;
		border-radius: 14px; /* optional */
	}

	/* Mobile optimization */
	@media (max-width: 768px) {
		.about-img img {
			max-width: 100%;
			border-radius: 8px;
		}
	}
	.service-icon-img {
  width: 42px;
  height: 42px;
  object-fit: contain;

  /* Tint PNG to theme color */
  filter: brightness(0) saturate(100%)
          invert(47%) sepia(87%)
          saturate(475%) hue-rotate(145deg)
          brightness(95%) contrast(95%);
}
	.service-btn {
  background: none;
  border: none;
  padding: 0;
  cursor: pointer;
}

.service-icon-img {
  width: 42px;
  height: 42px;
  object-fit: contain;
}

/* Center image inside circular icon */
.we-do-icon {
  display: flex;
  align-items: center;
  justify-content: center;
}
/* Bigger signup inputs */
.signup-form .form-control {
  height: 68px;              /* main size control */
  font-size: 18px;           /* text size */
  padding: 18px 22px;        /* inside spacing */
  border-radius: 12px;       /* softer look */
}

/* Bigger placeholder text */
.signup-form .form-control::placeholder {
  font-size: 17px;
}

/* Bigger button */
.signup-form .theme-btn {
  height: 70px;
  font-size: 20px;
  border-radius: 14px;
}

	/* =========================
   Footer Styles
========================= */
.footer {
    background: linear-gradient(135deg, #0f172a, #020617);
    color: #cbd5e1;
    padding: 80px 0 40px;
    font-size: 15px;
}

.footer .logo img {
    max-width: 160px;
    margin-bottom: 20px;
}

.footer p {
    color: #94a3b8;
    line-height: 1.7;
    margin-bottom: 20px;
}

.footer h4 {
    color: #ffffff;
    font-size: 18px;
    margin-bottom: 20px;
}

.footer-links {
    list-style: none;
    padding: 0;
}

.footer-links li {
    margin-bottom: 12px;
}

.footer-links li a {
    color: #94a3b8;
    text-decoration: none;
    transition: all 0.3s ease;
}

.footer-links li a:hover {
    color: #22d3ee;
    padding-left: 6px;
}

.footer-social-links ul {
    list-style: none;
    padding: 0;
    display: flex;
    gap: 14px;
}

.footer-social-links ul li a {
    width: 40px;
    height: 40px;
    background: rgba(255,255,255,0.06);
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    color: #e5e7eb;
    transition: all 0.3s ease;
}

.footer-social-links ul li a:hover {
    background: #22d3ee;
    color: #020617;
}

.footer-bottom {
    border-top: 1px solid rgba(255,255,255,0.08);
    margin-top: 40px;
    padding-top: 20px;
    text-align: center;
    color: #64748b;
    font-size: 14px;
}

/* Mobile */
@media (max-width: 768px) {
    .footer {
        text-align: center;
    }

    .footer-social-links ul {
        justify-content: center;
    }
}
